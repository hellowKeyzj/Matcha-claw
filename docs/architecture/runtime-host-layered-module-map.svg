<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1320" viewBox="0 0 1600 1320" role="img" aria-labelledby="title desc">
  <title id="title">runtime-host 当前实际内部分层</title>
  <desc id="desc">按当前代码真实职责绘制 runtime-host 内部 R0 到 R6 分层，强调职责层已形成但物理目录仍混层。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 18px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
      .layer-title { font: 700 22px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .layer-note { font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
      .box-title { font: 700 16px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .box-text { font: 13px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 12px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .warn { font: 700 14px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #92400e; }
      .arrow { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrowSoft); }
      .r0 { fill: #ecfdf5; stroke: #16a34a; }
      .r1 { fill: #f0fdfa; stroke: #0d9488; }
      .r2 { fill: #eff6ff; stroke: #2563eb; }
      .r3 { fill: #fef3c7; stroke: #d97706; }
      .r4 { fill: #f8fafc; stroke: #64748b; }
      .r5 { fill: #faf5ff; stroke: #9333ea; }
      .r6 { fill: #fdf2f8; stroke: #db2777; }
      .note { fill: #fff7ed; stroke: #f97316; }
      .layer { stroke-width: 2.4; rx: 20; }
      .box { stroke-width: 1.8; rx: 12; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b" />
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1320" />
  <text class="title" x="60" y="58">runtime-host 当前实际内部分层</text>
  <text class="subtitle" x="60" y="90">不是已经物理纯化的 L0-L7；当前是职责层已形成、目录仍混层的本地 runtime process。</text>

  <rect class="layer r0" x="60" y="125" width="1480" height="135" />
  <text class="layer-title" x="86" y="160">R0 Process bootstrap / composition root</text>
  <text class="layer-note" x="86" y="185">创建 container、读取环境、创建 parent transport、装配 system/application modules、组合 routes、启动 server/runner。</text>
  <rect class="box r0" x="86" y="202" width="330" height="38" />
  <text class="box-title" x="104" y="226">main.ts / runtime-host-composition.ts</text>
  <rect class="box r0" x="440" y="202" width="290" height="38" />
  <text class="box-title" x="458" y="226">runner / server</text>
  <rect class="box r0" x="754" y="202" width="360" height="38" />
  <text class="box-title" x="772" y="226">system + application module registries</text>
  <rect class="box r0" x="1138" y="202" width="330" height="38" />
  <text class="box-title" x="1156" y="226">route/job/lifecycle wiring</text>

  <rect class="layer r1" x="60" y="295" width="1480" height="135" />
  <text class="layer-title" x="86" y="330">R1 Infrastructure base / process services</text>
  <text class="layer-note" x="86" y="355">底层端口与 Node adapters：fs/http/process/env/clock/timer/scheduler/tcp/logger/lifecycle/jobs。</text>
  <rect class="box r1" x="86" y="372" width="315" height="38" />
  <text class="box-title" x="104" y="396">runtime-infrastructure-module.ts</text>
  <rect class="box r1" x="425" y="372" width="335" height="38" />
  <text class="box-title" x="443" y="396">runtime-host-infrastructure-adapters.ts</text>
  <rect class="box r1" x="784" y="372" width="220" height="38" />
  <text class="box-title" x="802" y="396">container.ts</text>
  <rect class="box r1" x="1028" y="372" width="330" height="38" />
  <text class="box-title" x="1046" y="396">job / lifecycle / background tasks</text>

  <rect class="layer r2" x="60" y="465" width="1480" height="190" />
  <text class="layer-title" x="86" y="500">R2 Runtime substrate / kernel / platform</text>
  <text class="layer-note" x="86" y="525">稳定 runtime 能力层：不是普通业务 application，而是 registries、routers、state stores、projection、timeline、policy、ledger。</text>
  <rect class="box r2" x="86" y="545" width="305" height="42" />
  <text class="box-title" x="104" y="570">Runtime address / scope / identity</text>
  <rect class="box r2" x="415" y="545" width="255" height="42" />
  <text class="box-title" x="433" y="570">Agent Runtime Kernel</text>
  <rect class="box r2" x="694" y="545" width="250" height="42" />
  <text class="box-title" x="712" y="570">Capability Platform</text>
  <rect class="box r2" x="968" y="545" width="285" height="42" />
  <text class="box-title" x="986" y="570">Canonical Session Runtime</text>
  <rect class="box r2" x="1277" y="545" width="220" height="42" />
  <text class="box-title" x="1295" y="570">Plugin Runtime</text>
  <rect class="box r2" x="86" y="602" width="270" height="42" />
  <text class="box-title" x="104" y="627">Plugin discovery substrate</text>
  <rect class="box r2" x="380" y="602" width="270" height="42" />
  <text class="box-title" x="398" y="627">Gateway Bridge substrate</text>
  <rect class="box r2" x="674" y="602" width="250" height="42" />
  <text class="box-title" x="692" y="627">Platform Runtime</text>
  <rect class="box r2" x="948" y="602" width="250" height="42" />
  <text class="box-title" x="966" y="627">Tool registry / policy / ledger</text>
  <rect class="box r2" x="1222" y="602" width="275" height="42" />
  <text class="box-title" x="1240" y="627">External Connector / MCP catalog / downstream status</text>

  <rect class="layer r3" x="60" y="690" width="1480" height="170" />
  <text class="layer-title" x="86" y="725">R3 Application workflows / facades / orchestration runtimes</text>
  <text class="layer-note" x="86" y="750">推进具体流程；多数 workflow 在 application/workflows/**，但 TeamRun 是长生命周期 orchestration runtime。</text>
  <rect class="box r3" x="86" y="770" width="205" height="42" />
  <text class="box-title" x="104" y="795">Session workflows</text>
  <rect class="box r3" x="315" y="770" width="255" height="42" />
  <text class="box-title" x="333" y="795">TeamRun runtime</text>
  <rect class="box r3" x="594" y="770" width="220" height="42" />
  <text class="box-title" x="612" y="795">Provider/config workflows</text>
  <rect class="box r3" x="838" y="770" width="220" height="42" />
  <text class="box-title" x="856" y="795">Plugin lifecycle workflows</text>
  <rect class="box r3" x="1082" y="770" width="180" height="42" />
  <text class="box-title" x="1100" y="795">Runtime ops</text>
  <rect class="box r3" x="1286" y="770" width="211" height="42" />
  <text class="box-title" x="1304" y="795">Registry / status / sync ports</text>
  <text class="warn" x="86" y="836">注意：service.ts 有薄 facade、聚合 facade、实际编排核心三种语义；不能按文件名判断层级。</text>

  <rect class="layer r4" x="60" y="895" width="1480" height="135" />
  <text class="layer-title" x="86" y="930">R4 Inbound dispatch / outbound parent bridge boundaries</text>
  <text class="layer-note" x="86" y="955">入站 routes、CLI/MCP shell 与出站 parent bridge 都是 boundary，但方向相反，不能混成同一种 adapter。</text>
  <rect class="box r4" x="86" y="972" width="310" height="38" />
  <text class="box-title" x="104" y="996">api/dispatch/**</text>
  <rect class="box r4" x="420" y="972" width="310" height="38" />
  <text class="box-title" x="438" y="996">api/routes/**</text>
  <rect class="box r4" x="754" y="972" width="330" height="38" />
  <text class="box-title" x="772" y="996">route-registry / CLI program shell</text>
  <rect class="box r4" x="1108" y="972" width="330" height="38" />
  <text class="box-title" x="1126" y="996">parent-transport-client.ts</text>

  <rect class="layer r5" x="60" y="1065" width="1480" height="145" />
  <text class="layer-title" x="86" y="1100">R5 OpenClaw integration surface</text>
  <text class="layer-note" x="86" y="1125">不是 TeamRun 事实源；只把 runtime-host 状态接到 OpenClaw runtime、gateway、config projection 与 native subagent materialization。</text>
  <rect class="box r5" x="86" y="1145" width="260" height="42" />
  <text class="box-title" x="104" y="1170">runtime adapter / driver</text>
  <rect class="box r5" x="370" y="1145" width="245" height="42" />
  <text class="box-title" x="388" y="1170">V4 canonical adapter</text>
  <rect class="box r5" x="639" y="1145" width="220" height="42" />
  <text class="box-title" x="657" y="1170">config/state projections</text>
  <rect class="box r5" x="883" y="1145" width="220" height="42" />
  <text class="box-title" x="901" y="1170">MCP projection/status adapter</text>
  <rect class="box r5" x="1127" y="1145" width="180" height="42" />
  <text class="box-title" x="1145" y="1170">gateway bridge</text>
  <rect class="box r5" x="1331" y="1145" width="166" height="42" />
  <text class="box-title" x="1349" y="1170">subagent materialization</text>

  <rect class="layer r6" x="60" y="1240" width="1480" height="60" />
  <text class="layer-title" x="86" y="1276">R6 OpenClaw plugin extension edge</text>
  <text class="layer-note" x="455" y="1276">packages/openclaw-* / tools / hooks / provider implementations；不是 runtime-host core。</text>

  <path class="arrow" d="M800 260 L800 292" />
  <path class="arrow" d="M800 430 L800 462" />
  <path class="arrow" d="M800 655 L800 687" />
  <path class="arrow" d="M800 860 L800 892" />
  <path class="arrow" d="M800 1030 L800 1062" />
  <path class="arrow" d="M800 1210 L800 1237" />
  <path class="soft-arrow" d="M1270 812 C1460 840 1480 1040 1330 1142" />
  <path class="soft-arrow" d="M252 973 C210 900 250 730 415 647" />
  <path class="soft-arrow" d="M1265 972 C1410 890 1395 705 1115 644" />
</svg>
