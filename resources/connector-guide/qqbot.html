<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QQ Bot Operation Guide</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      background: #f6f7f9;
      color: #172033;
    }
    body {
      margin: 0;
      padding: 32px 20px;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px;
      border: 1px solid #dde2ea;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 18px 45px rgba(16, 24, 40, 0.08);
    }
    h1, h2, h3 {
      line-height: 1.25;
    }
    h1 {
      margin-top: 0;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e8ef;
    }
    img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 16px 0 24px;
      border: 1px solid #e5e8ef;
      border-radius: 8px;
    }
    code, pre {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    pre {
      overflow: auto;
      padding: 14px;
      border-radius: 8px;
      background: #f1f3f7;
    }
    a {
      color: #1f66d1;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        background: #111318;
        color: #e8ecf3;
      }
      main {
        border-color: #2c313a;
        background: #181b21;
        box-shadow: none;
      }
      h1 {
        border-bottom-color: #2c313a;
      }
      img {
        border-color: #2c313a;
      }
      pre {
        background: #101217;
      }
      a {
        color: #80b3ff;
      }
    }
  </style>
</head>
<body>
  <main>
<h1>QQ Bot Operation Guide</h1>
<h2>第一步：创建机器人</h2>
<ul>
<li>进入<a href="https://cloud.tencent.com/developer/tools/blog-entry?target=https%3A%2F%2Fq.qq.com%2Fqqbot%2Fopenclaw%2Flogin.html&amp;objectId=2626045&amp;objectType=1&amp;contentType=rich">QQ开放平台</a></li>
</ul>
<p><img src="qqbot-images/001.png" alt=""></p>
<ul>
<li>点击创建机器人</li>
</ul>
<p><img src="qqbot-images/002.png" alt=""></p>
<ul>
<li>在机器人页面中找到 AppID 和 AppSecret，分别点击右侧复制按钮，保存到记事本或备忘录中。AppSecret 不支持明文保存，离开页面后再查看会强制重置，请务必妥善保存。</li>
</ul>
<p><img src="qqbot-images/003.png" alt=""></p>
<h2>第二步：在matchaclaw中添加QQ bot</h2>
<p><img src="qqbot-images/004.png" alt=""></p>
<p><img src="qqbot-images/005.png" alt=""></p>

  </main>
</body>
</html>
