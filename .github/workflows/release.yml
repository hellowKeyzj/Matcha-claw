# MatchaClaw Release Workflow
# Builds and publishes releases for macOS, Windows, and Linux

name: Release
run-name: Release (${{ github.event_name }})

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
      platform:
        description: 'Build target platform'
        required: false
        default: 'win'
        type: choice
        options:
          - win
          - mac
          - linux
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          event="${{ github.event_name }}"
          platform="${{ github.event.inputs.platform }}"

          if [ "$event" = "push" ] || [ -z "$platform" ] || [ "$platform" = "all" ]; then
            include='[{"os":"macos-latest","platform":"mac"},{"os":"windows-latest","platform":"win"},{"os":"ubuntu-latest","platform":"linux"}]'
          elif [ "$platform" = "win" ]; then
            include='[{"os":"windows-latest","platform":"win"}]'
          elif [ "$platform" = "mac" ]; then
            include='[{"os":"macos-latest","platform":"mac"}]'
          elif [ "$platform" = "linux" ]; then
            include='[{"os":"ubuntu-latest","platform":"linux"}]'
          else
            echo "Unsupported platform input: $platform"
            exit 1
          fi

          echo "include=$include" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix: $include"

  release:
    needs: resolve-matrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.include) }}

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv binaries for macOS
        if: matrix.platform == 'mac'
        run: pnpm run uv:download:mac

      - name: Download uv binaries for Windows
        if: matrix.platform == 'win'
        run: pnpm run uv:download:win

      - name: Download uv binaries for Linux
        if: matrix.platform == 'linux'
        run: pnpm run uv:download:linux

      # macOS specific steps
      - name: Free disk space (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h /
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/lib/node_modules || true
          rm -rf ~/Library/Caches/electron-builder/dmg-builder* || true
          brew cleanup --prune=all 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h /

      # --publish never: prevent electron-builder from auto-publishing to GitHub.
      # All artifacts are collected and published atomically in the publish job.
      - name: Build macOS
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ulimit -n 65536
          echo "File descriptor limit: $(ulimit -n)"

          pnpm run build:vite
          pnpm exec zx scripts/bundle-openclaw.mjs
          pnpm exec zx scripts/bundle-openclaw-plugins.mjs
          pnpm exec zx scripts/bundle-preinstalled-skills.mjs

          BUILDER_ARGS=(--mac --publish never)
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            echo "Detected macOS certificate; building signed artifacts"
            if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
              echo "Detected notarization credentials; keep notarize=true from electron-builder.yml"
            else
              echo "Apple notarization credentials not complete; disable notarization for this run"
              BUILDER_ARGS+=("-c.mac.notarize=false")
            fi
          else
            echo "No CSC cert credentials; building unsigned macOS artifacts"
            unset CSC_LINK CSC_KEY_PASSWORD CSC_INSTALLER_LINK CSC_INSTALLER_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            BUILDER_ARGS+=("-c.mac.identity=null" "-c.mac.notarize=false")
          fi

          pnpm exec electron-builder "${BUILDER_ARGS[@]}"

      # Windows specific steps
      - name: Build Windows
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run build:vite && pnpm exec zx scripts/bundle-openclaw.mjs && pnpm exec zx scripts/bundle-openclaw-plugins.mjs && pnpm exec zx scripts/bundle-preinstalled-skills.mjs && pnpm exec electron-builder --win --publish never

      # Linux specific steps
      - name: Build Linux
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run build:vite && pnpm exec zx scripts/bundle-openclaw.mjs && pnpm exec zx scripts/bundle-openclaw-plugins.mjs && pnpm exec zx scripts/bundle-preinstalled-skills.mjs && pnpm exec electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            !release/builder-debug.yml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job: Publish to GitHub Releases
  # ──────────────────────────────────────────────────────────────
  publish:
    needs: release
    runs-on: ubuntu-latest
    env:
      UPDATE_SERVER_HOST: ${{ secrets.UPDATE_SERVER_HOST }}
      UPDATE_SERVER_PORT: ${{ secrets.UPDATE_SERVER_PORT }}
      UPDATE_SERVER_USER: ${{ secrets.UPDATE_SERVER_USER }}
      UPDATE_SERVER_PATH: ${{ secrets.UPDATE_SERVER_PATH }}
      UPDATE_SERVER_SSH_KEY: ${{ secrets.UPDATE_SERVER_SSH_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all downloaded artifacts
        run: |
          echo "=== All artifacts downloaded ==="
          find release-artifacts/ -type f -exec ls -lh {} \;
          echo ""
          echo "=== File tree ==="
          tree release-artifacts/ || find release-artifacts/ -print

      - name: Remove duplicate builder-debug files
        run: |
          echo "Removing builder-debug.yml files to avoid duplicate asset upload conflicts..."
          find release-artifacts/ -name "builder-debug.yml" -delete -print || true

      - name: Prepare deploy bundle
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          rm -rf deploy-bundle
          mkdir -p deploy-bundle
          find release-artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.yml" -o \
            -name "*.blockmap" \
          \) -exec cp -f {} deploy-bundle/ \;
          echo "Prepared deploy bundle:"
          ls -lh deploy-bundle

      - name: Deploy update files to update server
        if: startsWith(github.ref, 'refs/tags/') && env.UPDATE_SERVER_HOST != '' && env.UPDATE_SERVER_USER != '' && env.UPDATE_SERVER_PATH != '' && env.UPDATE_SERVER_SSH_KEY != ''
        run: |
          set -euo pipefail
          port="${UPDATE_SERVER_PORT:-22}"

          install -m 700 -d ~/.ssh
          printf '%s' "$UPDATE_SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$port" -H "$UPDATE_SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -p "$port" "$UPDATE_SERVER_USER@$UPDATE_SERVER_HOST" "mkdir -p '$UPDATE_SERVER_PATH'"
          rsync -avz --delete -e "ssh -p $port" deploy-bundle/ "$UPDATE_SERVER_USER@$UPDATE_SERVER_HOST:$UPDATE_SERVER_PATH/"

      - name: Skip server deploy (missing secrets)
        if: startsWith(github.ref, 'refs/tags/') && (env.UPDATE_SERVER_HOST == '' || env.UPDATE_SERVER_USER == '' || env.UPDATE_SERVER_PATH == '' || env.UPDATE_SERVER_SSH_KEY == '')
        run: |
          echo "Server deploy skipped: missing one or more required secrets."
          echo "Required: UPDATE_SERVER_HOST, UPDATE_SERVER_USER, UPDATE_SERVER_PATH, UPDATE_SERVER_SSH_KEY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.yml
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          make_latest: ${{ !(contains(github.ref, 'alpha') || contains(github.ref, 'beta')) }}
          generate_release_notes: true
          body: |
            ## 🚀 MatchaClaw ${{ github.ref_name }}
             
            MatchaClaw - Graphical AI Assistant based on OpenClaw
            
            ### 📦 Downloads
            
            Please select the appropriate installer for your operating system and architecture:
            
            #### macOS
            - **Apple Silicon (M1/M2/M3/M4)**: `MatchaClaw-*-mac-arm64.dmg`
            - **Intel (x64)**: `MatchaClaw-*-mac-x64.dmg`
            
            #### Windows
            - **Installer (x64)**: `MatchaClaw-*-win-x64.exe`
            - **Installer (ARM64)**: `MatchaClaw-*-win-arm64.exe`
            
            #### Linux
            - **AppImage (x64)**: `MatchaClaw-*-linux-x86_64.AppImage` (Universal format, recommended)
            - **AppImage (ARM64)**: `MatchaClaw-*-linux-arm64.AppImage`
            - **Debian/Ubuntu (x64)**: `MatchaClaw-*-linux-amd64.deb`
            - **Debian/Ubuntu (ARM64)**: `MatchaClaw-*-linux-arm64.deb`
            - **RPM (x64)**: `MatchaClaw-*-linux-x86_64.rpm`
            
            ### 📝 Release Notes
            
            See the auto-generated release notes below for detailed changes.
            
            ### ⚠️ Installation Notes
            
            - **macOS**: On first launch, you may see "cannot verify developer". Go to System Preferences → Security & Privacy to allow the app to run
            - **Windows**: SmartScreen may block the app. Click "More info" → "Run anyway" to proceed
            - **Linux AppImage**: First run `chmod +x MatchaClaw-*.AppImage` to add execute permission. On Ubuntu 22.04 you may also need `sudo apt install libfuse2`; on Ubuntu 24.04 use `sudo apt install libfuse2t64`
            - **Linux .deb (Ubuntu 24.04)**: If installation fails due to missing dependencies, use `sudo apt install libgtk-3-0t64 libnotify4t64 libxss1t64` before installing
            
            ---
            
            💬 Found an issue? Please submit an [Issue](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
