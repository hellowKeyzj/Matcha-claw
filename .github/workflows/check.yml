# MatchaClaw CI Workflow
# Runs on pull requests
name: Check and Build

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Prefer HTTPS for public GitHub git dependencies
        run: |
          git config --global "url.https://github.com/.insteadOf" "git@github.com:"
          git config --global --add "url.https://github.com/.insteadOf" "ssh://git@github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OpenClaw plugin source inputs
        run: pnpm run check:openclaw-plugin-inputs

      - name: Run linter
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Check trait boundary
        run: pnpm run check:trait-boundary

      - name: Run contract tests
        run: pnpm run test:contract

      - name: Run tests
        run: pnpm run test

  build:
    runs-on: windows-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      BUILD_MATCHA_AGENT: ${{ vars.BUILD_MATCHA_AGENT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Bun
        if: env.BUILD_MATCHA_AGENT == '1'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Prefer HTTPS for public GitHub git dependencies
        run: |
          git config --global "url.https://github.com/.insteadOf" "git@github.com:"
          git config --global --add "url.https://github.com/.insteadOf" "ssh://git@github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OpenClaw plugin source inputs
        run: pnpm run check:openclaw-plugin-inputs

      - name: Build matcha-agent
        if: env.BUILD_MATCHA_AGENT == '1'
        run: pnpm run build:matcha-agent

      - name: Build
        run: pnpm run build:vite
